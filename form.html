<html>
    <head>
        <title>form</title>
        <style>
            #d1
            {
                margin-left: 40%;
                


            }
            tr:nth-child(odd) {
                background-color:pink;
            }
            tr:nth-child(even) {
                background-color: palevioletred;
            }
            
        </style>
    </head>
    <body style="background-color : black;">
        <h1 style="text-align:center;color: white;">Login page </h1> 
        <div id="d1">
        <form id="login page" action="homepage.html">
            <table border="3" style="border-spacing: 10;text-align: center;background-color:white;">
                <tr>
                    <td>
                        Full name: <input type="text" placeholder="full name" name="fullname" value="" id="fn">
                    </td>
                 </tr>
                 <tr>
                    <td>
                        Birthdate: <input type="date" id="bdate" name="bdate" max="2009-03-30">
                    </td>
                 </tr>
                 <tr>
                    <td>
                        Gender: <input type="radio" id="gender" name="gender" value="male" checked>Male <input type="radio" id="gender" name="gender" value="Female">Female <input type="radio" id="gender" name="gender" value="other">Other
                    </td>
                 </tr>
                <tr>
                    <td>
                        Phone number: <input type="text" placeholder="phonenumber" name="phonenumnber" value="" id="pn">
                    </td>
                </tr>
                <tr>

                    <td>
                        email: <input type="email" placeholder="enter email id" name="email" value="" id="email">
                    </td>
                </tr>
                <tr>
                    <td>
                       Password: <input type="password" placeholder="password" name="pass" value="" id="pass">
                    </td>
                </tr>
                <tr>
                    <td>
                       confirm password: <input type="password" placeholder="confirmpassword" name="confirmpass" value="" id="confirmpass">
                    </td>
                </tr>
                <tr>
                    <td>
                        Address: <textarea placeholder="delivery address" name="address" value="" rows="5" cols="20" id="address"></textarea>
                    </td>
                </tr>
                <tr>
                    <td>
                        Pincode: <input type="text" placeholder="pincode" name="pincode" value="" id="pincode">
                    </td>
                </tr>
                <tr>
                    <td><input type="submit" value="submit" onclick="myfunction()" >
                        <input type="reset" value="reset">
                    </td>
                
                </tr>
                
                
            </table>
        </form>
    </div>
        <script>
            function myfunction()
            { const fn=document.getElementById('fn').value;
            const bdate=document.getElementById('bdate').value;
            const pn=document.getElementById('pn').value;
            const email=document.getElementById('email').value;
            const pass=document.getElementById('pass').value;
            const confirm=document.getElementById('confirmpass').value;
            const address=document.getElementById('address').value;
            const pincode=document.getElementById('pincode').value;

            var error="";
            if(fn=="" || bdate=="" || pn=="" || email=="" || pass=="" || confirm=="" || address=="" || pincode=="")
            {
                error+= "all the feilds must be filled\n";
            }
            if(pn.length!=10){
                error+= "phone number must contain 10 digit\n";
            }
            if(isNaN(pn)){
                error+= "phone numbers must contain numbers only\n";
            }
            if(isNaN(pincode)){
                error+= "pincode must contain numbers only\n";
            }
            if(pass.length<8){
                error+= "password must contain  atleast 8 characters\n";
            }
            if(pass!=confirm){
                error+= "confirm password must be same to original password\n";
            }
        
            if (error==""){
                alert("form submitted successfully");
            }
            else
            {
                alert(error);

            }
            

            }
        </script>


    </body>
</html>
